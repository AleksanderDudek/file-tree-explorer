<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FileTree Explorer</title>
    <script>
      // GitHub Pages SPA redirect: encode the current path as a query param
      // so index.html can restore it via history.replaceState.
      var l = globalThis.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replaceAll('&', '~and~') +
        (l.search ? '&' + l.search.slice(1).replaceAll('&', '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
